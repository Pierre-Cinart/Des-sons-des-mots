<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Css/style.css">
    <title>Des sons et des mots</title>
</head>
<body>
    <!--
        Header de partie.
        Pour l'etape 1, on garde seulement les emplacements utiles :
        niveau, pieces et messages. Les vraies regles de pieces arriveront plus tard.
    -->
    <header id="infoBar" class="game-status" aria-label="Informations de partie">
        <p>Niveau : <span id="levelValue">0</span></p>
        <p>Pieces : <span id="coinValue">0</span></p>
    </header>

    <!--
        Ecran principal du jeu.
        Les zones sont separees des maintenant pour faciliter les prochaines etapes :
        menu, sons, reponse, lettres et feedback.
    -->
    <main id="screen" class="game-screen">
        <section id="menu" class="start-menu" aria-labelledby="gameTitle">
            <h1 id="gameTitle">DES SONS ET DES MOTS</h1>

            <div class="start-menu__actions">
                <button class="_btn" type="button" data-start-game>
                    JOUER
                </button>
                <button class="_btn" type="button" data-toggle-info aria-expanded="false" aria-controls="infoTxt">
                    INFOS
                </button>
            </div>

            <aside id="infoTxt" class="info-panel" hidden>
                <p>
                    Dans ce jeu vous devez ecouter des sons et en deduire le mot avec les lettres proposees.
                </p>
                <p>
                    Ce jeu est en cours de refonte pedagogique.
                </p>
                <button class="_btn" type="button" data-toggle-info>
                    Fermer
                </button>
            </aside>
        </section>

        <section id="sounds" class="sound-panel" aria-label="Sons disponibles">
            <button class="sound-button" type="button" data-sound-index="0" aria-label="Jouer le son 1">
                <img src="Images/play.png" alt="" aria-hidden="true">
            </button>
            <button class="sound-button" type="button" data-sound-index="1" aria-label="Jouer le son 2">
                <img src="Images/play.png" alt="" aria-hidden="true">
            </button>
            <button class="sound-button" type="button" data-sound-index="2" aria-label="Jouer le son 3">
                <img src="Images/play.png" alt="" aria-hidden="true">
            </button>
        </section>

        <section class="answer-zone" aria-label="Reponse en cours">
            <div id="lettersEmpty" class="answer-slots"></div>
        </section>

        <section class="letters-zone" aria-label="Lettres disponibles">
            <div id="letters" class="letter-bank"></div>
        </section>

        <p id="feedback" class="feedback-zone" aria-live="polite"></p>
    </main>

    <script type="text/javascript" src="./Js/app.js"></script>
</body>
</html>
